run_name: new_run
backbone: vjepa2_vitl_diving48
predict_per_item: 64
model:
  fc_drop_rate: 0.5
  class_weights: inv_freq_sqrt
  freeze_encoder_layers: 12
  gradient_checkpointing: false   # activation checkpointing: ~25-30% slower, big VRAM cut (fits ViT-L in ~9GB bs4). V-JEPA 2 / 2.1 only; errors on VideoPrism.
  max_class_weight: null   # cap inverse-frequency class/pos weights (null = no cap; e.g. 20 for rare classes)
data:
  chunk_length: 64
  chunk_shift: 32
  chunk_step: 1
  resize_to: 256
  resize_style: square
  do_aa: true
  part_sample: 1.0
  subsample_keep_rare_threshold: null
training:
  epochs: 10
  train_bs: 4
  val_bs: 8
  num_workers: -1   # -1 = auto: min(16, CPUs available to the process); 0 = main process; or pin a positive int
  part_warmup: 0.2
  lr: 4.0e-5
  weight_decay: 0.1
  label_smoothing: 0.1
  compile: true
  patience: null
  grad_clip_norm: null     # global grad-norm clip (null = off; e.g. 1.0 to stabilize rare-class runs)
  log_grad_norm: true      # log global grad-norm every step even when not clipping (cheap)
  heavy_log_every: null    # if set (e.g. 200), every N steps log per-layer grad/weight-norm + per-element loss histograms
mixup_alpha: 0.8
ema_decay: null
seed: 0
device: "cuda"
starting_checkpoint: null
max_batches: null
multilabel_threshold: 0.85
